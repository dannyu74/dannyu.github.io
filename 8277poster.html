<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8277 人工智能 AI 產品宣傳海報</title>
    <style>
        /* --- 核心：強對比幾何圖案背景 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif;
            background-color: #f1f5f9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 幾何背景層：使用粗線條與斜紋 */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 200%; height: 200%;
            /* 製作明顯的網格與對角線 */
            background-image: 
                linear-gradient(45deg, rgba(14, 165, 233, 0.05) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(14, 165, 233, 0.05) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, rgba(14, 165, 233, 0.05) 75%), 
                linear-gradient(-45deg, transparent 75%, rgba(14, 165, 233, 0.05) 75%),
                linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 100px 100px, 100px 100px, 50px 50px, 50px 50px;
            z-index: -1;
            /* 讓圖案持續滾動 */
            animation: move-it 30s linear infinite;
        }

        @keyframes move-it {
            from { transform: translate(0, 0); }
            to { transform: translate(-100px, -100px); }
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.8rem; letter-spacing: 12px; color: #0f172a; font-weight: 300; margin-bottom: 5px; }
        .subtitle { color: #64748b; letter-spacing: 5px; font-size: 0.9rem; text-transform: uppercase; }

        /* 3 欄佈局 */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        @media (max-width: 992px) { .grid-layout { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { .grid-layout { grid-template-columns: 1fr; } }

        /* 卡片設計 */
        .ai-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            transition: 0.4s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .ai-card:hover {
            transform: translateY(-10px);
            background: #fff;
            border-color: #38bdf8;
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.1);
        }

        .tool-name { font-size: 1.4rem; font-weight: bold; color: #1e293b; margin-bottom: 15px; display: block; }
        .tool-link {
            font-size: 0.85rem; color: #0284c7; text-decoration: none; word-break: break-all;
            display: block; padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0;
        }
        .tool-link:hover { background: #0ea5e9; color: #fff; border-color: #0284c7; }

        footer { text-align: center; margin-top: 80px; color: #94a3b8; font-size: 0.8rem; letter-spacing: 5px; }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="main-container">
    <header>
        <h1>AI 海報班</h1>
        <div class="subtitle">AI Design Resource Hub</div>
    </header>

    <div class="grid-layout">
        <div class="ai-card">
            <span class="tool-name">即夢國際版</span>
            <a href="https://dreamina.capcut.com/zh-tw" class="tool-link" target="_blank">dreamina.capcut.com</a>
        </div>

        <div class="ai-card">
            <span class="tool-name">Somake</span>
            <a href="https://www.somake.ai/register?aff=CDAD695C" class="tool-link" target="_blank">somake.ai</a>
        </div>

        <div class="ai-card">
            <span class="tool-name">Arena</span>
            <a href="https://arena.ai" class="tool-link" target="_blank">arena.ai</a>
        </div>

        <div class="ai-card">
            <span class="tool-name">Duckduckgo</span>
            <a href="https://duck.ai" class="tool-link" target="_blank">duck.ai</a>
        </div>

        <div class="ai-card">
            <span class="tool-name">Lovart</span>
            <a href="https://www.lovart.ai/zh-TW" class="tool-link" target="_blank">lovart.ai</a>
        </div>

        <div class="ai-card">
            <span class="tool-name">Watermarkremover</span>
            <a href="https://www.watermarkremover.io" class="tool-link" target="_blank">watermarkremover.io</a>
        </div>
    </div>

    <footer>8277 COURSE | 人工智能 AI 產品宣傳海報</footer>
</div>

</body>
</html>
