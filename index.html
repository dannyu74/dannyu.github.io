<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny U 時間表</title>
    <style>
        body {
            background-color: #e9e4d1; 
            background-image: radial-gradient(#d1ccb9 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        /* 左右並排佈局，確保互不遮擋 */
        .wrapper {
            display: flex;
            flex-direction: row; 
            gap: 50px;
            max-width: 1200px;
            width: 100%;
            align-items: flex-start;
        }

        /* 左邊主內容：標題與課表圖 */
        .main-content {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-tag {
            background: white;
            padding: 10px 40px;
            border: 2px solid #555;
            transform: rotate(-1.5deg);
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .poster-container {
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
        }

        .course-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 右邊側邊欄：溫馨提示、WhatsApp、日期 */
        .sidebar {
            flex: 1;
            margin-top: 80px;
            min-width: 260px;
        }

        .sticky-note {
            background: #fff982;
            padding: 25px;
            border: 1px solid #e6e600;
            transform: rotate(2deg);
            box-shadow: 8px 8px 15px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        /* 藍色膠帶飾物 */
        .sticky-note::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 20%;
            width: 80px;
            height: 25px;
            background: rgba(173, 216, 230, 0.6);
            transform: rotate(-10deg);
        }

        .whatsapp-btn {
            display: block;
            margin: 20px 0;
            padding: 12px;
            background: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .whatsapp-btn:hover {
            background: #128c7e;
            transform: scale(1.05);
        }

        /* 更新日期樣式 */
        .update-date {
            margin-top: 25px;
            font-size: 13px;
            color: #666;
            border-top: 1px dashed #d4a017;
            padding-top: 15px;
        }

        .download-btn {
            margin-top: 40px;
            background: white;
            color: #333;
            padding: 15px 30px;
            border: 2px dashed #555;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        /* 手機版適應：自動變回上下排列 */
        @media (max-width: 950px) {
            .wrapper { flex-direction: column; align-items: center; }
            .sidebar { margin-top: 30px; width: 100%; max-width: 320px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-content">
            <div class="header-tag">
                <h1 style="margin:0; color:#ff6f61;">📌 2026初夏時間表</h1>
            </div>

            <div class="poster-container">
                <img src="202604.jpg" alt="課程表" class="course-img">
            </div>

            <a href="202604.jpg" download class="download-btn">✂️ 下載完整課程表 (JPG)</a>
        </div>

       <div class="sticky-note">
    <h3 style="margin-top:0; color:#b8860b;">🌟 溫馨提示</h3>
    <p>🥛 勤飲水</p>
    <p>💪 保持身體健康</p>
    
    <p>🤔 有咩問題，直接 Whatsapp 我吧！</p>
    <a href="https://wa.me/85291548979" class="whatsapp-btn" target="_blank">
        💬 WhatsApp 聯繫
    </a>

    <div class="update-date">
        📅 最後更新日期：<br>
        <strong>2026-04-14</strong>
    </div>
</div>
    </div>

</body>
</html>
