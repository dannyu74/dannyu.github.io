<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danny U 時間表</title>
    <style>
        /* --- 1. 核心底色：極光曜石黑 + 現代速度感斜線網格 --- */
        body {
            background-color: #0b0d17; /* 極酷曜石黑 */
            background-image: 
                linear-gradient(135deg, rgba(147, 51, 234, 0.07) 25%, transparent 25%), 
                linear-gradient(225deg, rgba(147, 51, 234, 0.07) 25%, transparent 25%), 
                linear-gradient(45deg, rgba(147, 51, 234, 0.07) 25%, transparent 25%), 
                linear-gradient(315deg, rgba(147, 51, 234, 0.07) 25%, #0b0d17 25%);
            background-position: 40px 0, 40px 0, 0 0, 0 0;
            background-size: 80px 80px; /* 具備空間感的潮流幾何網格 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: #ffffff;
        }

        /* 左右並排佈局 */
        .wrapper {
            display: flex;
            flex-direction: row; 
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            align-items: flex-start;
        }

        /* --- 2. 左邊主內容：極光霓虹標題與課表 --- */
        .main-content {
            flex: 2.3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-tag {
            background: linear-gradient(135deg, #9333ea, #ff7a00); /* 電光紫 到 活力橘 漸變 */
            padding: 15px 45px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(147, 51, 234, 0.4);
            margin-bottom: 35px;
            transform: skewX(-4deg); /* 帶有速度感的傾斜設計 */
        }

        .main-title {
            margin: 0; 
            color: #ffffff;
            letter-spacing: 2px;
            font-weight: 900;
            font-size: 1.9rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .poster-container {
            background: #16192b; /* 暗色內襯 */
            padding: 12px;
            border: 2px solid #2a2e4a;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .poster-container:hover {
            border-color: #9333ea; /* 懸停時邊框發光 */
        }

        .course-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        .download-btn {
            margin-top: 35px;
            background: #ffffff; 
            color: #0b0d17;
            padding: 14px 40px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .download-btn:hover {
            background: #ff7a00; /* 懸停變橘色 */
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 122, 0, 0.4);
        }

        /* --- 3. 右邊側邊欄：潮流半透明玻璃提示卡 --- */
        .sidebar {
            flex: 1;
            margin-top: 90px;
            min-width: 280px;
        }

        .ancient-scroll-note {
            background: rgba(22, 25, 43, 0.85);
            backdrop-filter: blur(10px); /* 現代毛玻璃質感 */
            padding: 30px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .scroll-title {
            margin-top: 0; 
            color: #ff7a00; /* 活力珊瑚橘 */
            letter-spacing: 1px;
            font-size: 1.3rem;
            font-weight: bold;
            border-bottom: 2px solid #2a2e4a;
            padding-bottom: 12px;
            text-align: center;
        }

        .scroll-text {
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
            text-align: left;
            margin: 20px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .scroll-text::before {
            content: "⚡";
            position: absolute;
            left: 0;
            color: #9333ea; /* 電光紫符號 */
        }

        .whatsapp-btn {
            display: block;
            margin: 30px 0 15px 0;
            padding: 14px;
            background: linear-gradient(135deg, #25d366, #128c7e); /* 保留經典醒目綠但做成漸變 */
            color: white;
            text-decoration: none;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }

        .update-date {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #64748b;
            border-top: 1px solid #2a2e4a;
            padding-top: 15px;
            text-align: center;
        }

        /* 手機版響應式適應 */
        @media (max-width: 950px) {
            body { padding: 20px; }
            .wrapper { flex-direction: column; align-items: center; gap: 30px; }
            .sidebar { margin-top: 10px; width: 100%; max-width: 400px; }
            .header-tag { padding: 12px 30px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- 左邊主內容 -->
        <div class="main-content">
            <div class="header-tag">
                <h1 class="main-title">🔥 二零二六 盛夏時間表</h1>
            </div>

            <div class="poster-container">
                <img src="202607.jpg" alt="課程表" class="course-img">
            </div>

            <a href="202607.jpg" download class="download-btn">⚡ 下載完整課程表 (JPG)</a>
        </div>

        <!-- 右邊側邊欄 -->
        <div class="sidebar">
            <div class="ancient-scroll-note">
                <h3 class="scroll-title">🌟 溫馨提示</h3>
                
                <div class="scroll-text">🥛 熱到嘔，上電腦班，涼冷氣</div>
                <div class="scroll-text">💪 保持身體健康</div>
                <div class="scroll-text">🤔 有咩問題，直接 Whatsapp 我吧！</div>
                
                <a href="https://wa.me/85291548979" class="whatsapp-btn" target="_blank">
                    💬 WhatsApp 聯繫
                </a>

                <div class="update-date">
                    📅 最後更新日期：<br>
                    <strong>2026-07-15</strong>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
